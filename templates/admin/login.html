<!DOCTYPE html>
<html>
<head>
    <title>Login - VATS Palm Reports</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/admin.css">
</head>

<body class="login-body">

<!-- HEADER -->
<div class="header login-header">
    आचार्य विशाल वैष्णव – हस्तरेखा विशेषज्ञ एवं वैदिक ज्योतिष
</div>

<!-- MAIN CENTER -->
<div class="login-main">

    <!-- LOGO -->
    <img src="/static/ganesha.png" class="login-logo">

    <!-- BRAND -->
    <h1 class="brand-title">VATS Palm Reports</h1>

    <!-- LOGIN CARD -->
    <div class="login-card">

        <h3>Admin Panel Access</h3>

        <form method="post" class="login-form">

            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <button type="submit">Login</button>

        </form>

        <p class="secure-line">
            Secure Admin Access • Authorized Use Only
        </p>

    </div>

</div>

</body>
</html>
