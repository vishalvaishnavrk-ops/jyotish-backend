<!DOCTYPE html>
<html>
<head>
    <title>Login - VATS Palm Reports</title>

    <!-- Google Font (premium feel) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/admin.css">
</head>

<body class="login-body">

<!-- HEADER (same dashboard style) -->
<div class="header">
    आचार्य विशाल वैष्णव – हस्तरेखा विशेषज्ञ एवं वैदिक ज्योतिष
</div>

<!-- CENTER CONTENT -->
<div class="login-container">

    <!-- LOGO -->
    <img src="/static/ganesha.png" class="login-logo">

    <!-- BRAND NAME -->
    <h1 class="brand-title">VATS Palm Reports</h1>

    <!-- CARD -->
    <div class="login-card">

        <h3>Admin Panel Access</h3>

        <form method="post">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <p class="secure-line">
            Secure Admin Access • Authorized Use Only
        </p>

    </div>

</div>

</body>
</html>
